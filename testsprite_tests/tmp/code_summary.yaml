version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: Next.js 14 (App Router)
  - ui_library: shadcn/ui, Tailwind CSS, Radix UI
  - state: Zustand
  - http: Axios
routes:
  - path: /login
    file: src/app/(auth)/login/page.tsx
    auth_required: false
    description: Pagina de inicio de sesion
  - path: /poi/actividad/lista
    file: src/app/(dashboard)/poi/actividad/lista/page.tsx
    auth_required: true
    description: Lista de actividades KANBAN del POI
  - path: /poi/actividad/detalles
    file: src/app/(dashboard)/poi/actividad/detalles/page.tsx
    auth_required: true
    description: Detalle de una actividad con tabs de tareas y subactividades
  - path: /poi/proyectos
    file: src/app/(dashboard)/poi/proyectos/page.tsx
    auth_required: true
    description: Lista de proyectos SCRUM del POI
  - path: /dashboard
    file: src/app/(dashboard)/dashboard/page.tsx
    auth_required: true
    description: Panel principal
features:
  - name: Login
    description: Autenticacion de usuario con email y contrasena
    files:
      - src/app/(auth)/login/page.tsx
      - src/features/auth/services/auth.service.ts
    entry_route: /login
    user_interactions:
      - Ingresar email en campo de texto
      - Ingresar contrasena en campo de texto
      - Hacer clic en boton Iniciar Sesion
      - Ver mensaje de error si credenciales invalidas
    api_calls:
      - method: POST
        endpoint: /api/v1/auth/login
    auth_required: false

  - name: Crear Actividad
    description: Crear una nueva actividad KANBAN en el POI vinculada a una Accion Estrategica
    files:
      - src/app/(dashboard)/poi/actividad/lista/page.tsx
      - src/features/actividades/services/actividades.service.ts
    entry_route: /poi/actividad/lista
    user_interactions:
      - Iniciar sesion con rol PMO
      - Navegar a POI Actividades
      - Hacer clic en boton Nueva Actividad
      - Llenar campos nombre, codigo, descripcion, fechas inicio y fin
      - Seleccionar Accion Estrategica del PGD
      - Seleccionar coordinador responsable
      - Hacer clic en Guardar o Crear
      - Ver actividad creada en la lista
    api_calls:
      - method: GET
        endpoint: /api/v1/poi/actividades
      - method: POST
        endpoint: /api/v1/poi/actividades
    auth_required: true

  - name: Crear Subactividad
    description: Crear una subactividad dentro de una actividad existente
    files:
      - src/app/(dashboard)/poi/actividad/detalles/page.tsx
    entry_route: /poi/actividad/detalles
    user_interactions:
      - Iniciar sesion con rol PMO o COORDINADOR
      - Navegar al detalle de una actividad existente
      - Hacer clic en boton Nueva Subactividad o agregar subactividad
      - Llenar campos nombre, codigo, descripcion, fechas
      - Hacer clic en Guardar
      - Ver subactividad creada dentro de la actividad
    api_calls:
      - method: POST
        endpoint: /api/v1/poi/actividades/:id/subactividades
    auth_required: true

known_limitations:
  - issue: Crear actividades requiere rol PMO o COORDINADOR
    location: src/lib/permissions.ts
    impact: Tests deben usar credenciales con rol PMO
  - issue: La seleccion de Accion Estrategica depende de PGDs activos en el sistema
    location: src/features/actividades/components
    impact: Si no hay PGDs activos, el formulario de actividad no puede completarse
